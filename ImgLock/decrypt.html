<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./js/crypto-js.js"></script>
  <meta charset="UTF-8">
  <title>Decrypt</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <h1 id="title">Decrypt your picture</h1>

  <div class="zone">
    <div id="dropZ">
      <i class="fa fa-cloud-upload"></i>
      <div>Drag and drop your file here</div>
      <span>OR</span>

      <div class="selectFile">
        <label for="file">Select file</label>
        <input type="file" name="files[]" id="file" onchange="previewFile()">
      </div>

      <p>File size limit : 10 MB</p>
    </div>
  </div>

  <div class="zone-image">
    <textarea id="content" class="result" rows="20" cols="50"></textarea>
    <label>
      <input type="text" id="secret" placeholder="Enter your secret key">
      <button onclick="decryptFromDES()">Decrypt</button>
    </label>
  </div>

  <script>
    // Load encrypted text from file
    function previewFile() {
      const textarea = document.getElementById('content');
      const file = document.getElementById('file').files[0];

      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        textarea.value = e.target.result;
      };

      reader.readAsText(file);
    }

    // Decrypt using Triple DES
    function decryptFromDES() {
      var secretKey = document.getElementById('secret').value;

      if (secretKey === '') {
        alert("Please enter your secret key!");
        return;
      }

      var encryptedText = document.getElementById('content').value;

      try {
        // TripleDES decrypt
        var decryptedText = CryptoJS.TripleDES.decrypt(encryptedText, secretKey)
                           .toString(CryptoJS.enc.Utf8);

        // Validate decrypted data
        if (!decryptedText || !decryptedText.startsWith("data:image")) {
          alert("Incorrect secret key or invalid encrypted file!");
          return;
        }

        // Download the decrypted image
        var link = document.createElement('a');
        link.href = decryptedText;
        link.download = "decrypted_image.jpg";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

      } catch (err) {
        alert("There is an error in your document or the secret key is wrong!");
      }
    }
  </script>

</body>
</html>
