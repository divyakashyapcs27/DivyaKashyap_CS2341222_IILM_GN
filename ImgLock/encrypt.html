<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./js/crypto-js.js"></script>
  <script src="./js/FileSaver.js"></script>
  <meta charset="UTF-8">
  <title>Encrypt</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <h1 id="title">Encrypt your picture</h1>
  
  <div class="zone">
    <div id="dropZ">
      <i class="fa fa-cloud-upload"></i>
      <div>Drag and drop your file here</div>
      <span>OR</span>

      <div class="selectFile">
        <label for="file">Select file</label>
        <input type="file" accept="image/*" name="files[]" id="file" onchange="loadFile(event)">
      </div>

      <p>File size limit : 10 MB</p>
    </div>
  </div>

  <div class="zone-image">
    <img id="output" width="400" style="margin-top: 30px; position: relative;"/>
    
    <label>
      <input type="text" id="secret" placeholder="Enter your secret key">
      <button onclick="encryptToDES()">Encrypt</button>
    </label>
  </div>

  <script>
    var data;

    // Load Selected Image
    var loadFile = function(event) {
      var image = document.getElementById('output');
      image.src = URL.createObjectURL(event.target.files[0]);
    };

    // Convert Image to Base64 when loaded
    var img = document.getElementById('output');
    img.crossOrigin = 'Anonymous';

    img.onload = function() {
      var canvas = document.createElement('canvas');
      var ctx = canvas.getContext('2d');

      canvas.height = this.naturalHeight;
      canvas.width = this.naturalWidth;

      ctx.drawImage(this, 0, 0);

      // Convert image to Base64
      data = canvas.toDataURL('image/jpeg');
    };

    // Encrypt Image Using Triple DES
    function encryptToDES() {
      var secretKey = document.getElementById('secret').value;

      // Check image loaded
      if (!data) {
        alert("Image not loaded yet! Please wait.");
        return;
      }

      // Check secret key provided
      if (secretKey === '') {
        alert("Please enter your secret key!");
        return;
      }

      // Key length validation
      if (secretKey.length < 6) {
        alert("Secret key must be at least 6 characters.");
        return;
      }

      // Encrypt image Base64 string using Triple DES
      var encrypted = CryptoJS.TripleDES.encrypt(data, secretKey);

      // Convert encrypted object to text
      var encryptedText = encrypted.toString();

      // Save encrypted output
      saveAs(new Blob([encryptedText], { type: "text/plain;charset=utf-8" }), "encrypted_image.txt");
    }
  </script>

</body>
</html>
